name: WeaponsPlugin
version: "1.0.0"
main: com.example.weapons.WeaponsPlugin
api-version: "1.20"
authors: [CustomWeapons]
description: "Custom weapons plugin with unique abilities"

commands:
  weapon:
    description: "Give custom weapons"
    usage: "/weapon give <weapon> [player]  |  /weapon list"
    permission: weapons.give

permissions:
  weapons.give:
    description: "Give custom weapons"
    default: op
  weapons.use:
    description: "Use custom weapon abilities"
    default: true
